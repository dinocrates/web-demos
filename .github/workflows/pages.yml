name: Deploy Web Demos to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            variable-game-tuner/package-lock.json
            character-class-lab/package-lock.json
            constructor-demo/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Variable Game Tuner dependencies
        working-directory: variable-game-tuner
        run: npm ci

      - name: Build Variable Game Tuner
        working-directory: variable-game-tuner
        run: npm run build

      - name: Install Character Class Lab dependencies
        working-directory: character-class-lab
        run: npm ci

      - name: Build Character Class Lab
        working-directory: character-class-lab
        run: npm run build

      - name: Install Character Constructor Demo dependencies
        working-directory: constructor-demo
        run: npm ci

      - name: Build Character Constructor Demo
        working-directory: constructor-demo
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/variable-game-tuner
          mkdir -p _site/character-class-lab
          mkdir -p _site/constructor-demo
          cp index.html _site/index.html
          cp -R variable-game-tuner/dist/. _site/variable-game-tuner/
          cp -R character-class-lab/dist/. _site/character-class-lab/
          cp -R constructor-demo/dist/. _site/constructor-demo/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
